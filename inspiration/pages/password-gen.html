<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — FREE AI CONVERSION</title>
<meta name="description" content="Generate ultra-secure passwords with customizable length, character types, and strength meter. Free, instant, client-side.">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/tools.css">
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="header-logo">
    <img src="../logo.png" alt="Free AI Conversion Logo" style="height:24px;width:auto;">
  </a>
  <nav class="header-nav">
    <a href="../index.html#tools" class="nav-link">All Tools</a>
  </nav>
</header>

<main class="tool-page">
  <div class="tool-page-header">
    <a href="../index.html" class="back-link">← Back to all tools</a>
    <h1>🔐 Password Generator</h1>
    <p>Generate secure, random passwords with full control over length and character types.</p>
  </div>

  <div class="tool-container">
    <div class="tool-body">

      <div class="password-display">
        <span class="pw-text" id="pw-text">Click Generate ↓</span>
        <button class="btn btn-secondary" onclick="copyPw()" title="Copy">📋</button>
        <button class="btn btn-secondary" onclick="generate()" title="Regenerate">🔄</button>
      </div>

      <div class="strength-label" id="str-label">Strength: —</div>
      <div class="strength-meter"><div class="strength-fill" id="str-fill"></div></div>

      <div class="controls-row">
        <div class="control-group" style="flex:2">
          <label class="control-label">Length: <span id="len-val">16</span></label>
          <div class="range-wrap">
            <input type="range" class="range-slider" id="pw-len" min="4" max="64" value="16">
          </div>
        </div>
      </div>

      <div class="check-group">
        <label class="check-item"><input type="checkbox" id="opt-upper" checked> Uppercase (A–Z)</label>
        <label class="check-item"><input type="checkbox" id="opt-lower" checked> Lowercase (a–z)</label>
        <label class="check-item"><input type="checkbox" id="opt-nums" checked> Numbers (0–9)</label>
        <label class="check-item"><input type="checkbox" id="opt-syms" checked> Symbols (!@#$)</label>
      </div>

      <div class="controls-row">
        <button class="btn btn-primary btn-block" onclick="generate()">⚡ Generate Password</button>
      </div>

      <div class="stats-grid" style="margin-top:var(--space-lg)">
        <div class="stat-card">
          <div class="stat-value" id="s-entropy">—</div>
          <div class="stat-label">Bits Entropy</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="s-combos">—</div>
          <div class="stat-label">Combinations</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="s-crack">—</div>
          <div class="stat-label">Crack Time</div>
        </div>
      </div>

    </div>
  </div>
</main>

<div class="toast" id="toast">Copied!</div>

<script>
const lenSlider = document.getElementById('pw-len');
const lenVal = document.getElementById('len-val');

lenSlider.addEventListener('input', () => { lenVal.textContent = lenSlider.value; });

function generate() {
  const len = parseInt(lenSlider.value);
  const upper = document.getElementById('opt-upper').checked;
  const lower = document.getElementById('opt-lower').checked;
  const nums = document.getElementById('opt-nums').checked;
  const syms = document.getElementById('opt-syms').checked;

  let chars = '';
  if (upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (lower) chars += 'abcdefghijklmnopqrstuvwxyz';
  if (nums) chars += '0123456789';
  if (syms) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

  if (!chars) { alert('Select at least one character type.'); return; }

  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  let pw = '';
  for (let i = 0; i < len; i++) pw += chars[arr[i] % chars.length];

  document.getElementById('pw-text').textContent = pw;

  // Strength
  const poolSize = chars.length;
  const entropy = Math.round(len * Math.log2(poolSize));
  const combos = Math.pow(poolSize, len);

  let strength, color, width;
  if (entropy < 28) { strength = 'Very Weak'; color = '#EF4444'; width = '15%'; }
  else if (entropy < 36) { strength = 'Weak'; color = '#F97316'; width = '30%'; }
  else if (entropy < 60) { strength = 'Fair'; color = '#F59E0B'; width = '50%'; }
  else if (entropy < 80) { strength = 'Strong'; color = '#22C55E'; width = '75%'; }
  else { strength = 'Very Strong'; color = '#10B981'; width = '100%'; }

  document.getElementById('str-label').textContent = 'Strength: ' + strength;
  document.getElementById('str-label').style.color = color;
  const fill = document.getElementById('str-fill');
  fill.style.width = width;
  fill.style.background = color;

  document.getElementById('s-entropy').textContent = entropy;
  document.getElementById('s-combos').textContent = combos > 1e15 ? '10^' + Math.round(Math.log10(combos)) : combos.toLocaleString();

  // Crack time (10 billion guesses/sec)
  const seconds = combos / 1e10;
  let crackTime;
  if (seconds < 1) crackTime = 'Instant';
  else if (seconds < 60) crackTime = Math.round(seconds) + 's';
  else if (seconds < 3600) crackTime = Math.round(seconds/60) + ' min';
  else if (seconds < 86400) crackTime = Math.round(seconds/3600) + ' hrs';
  else if (seconds < 31536000) crackTime = Math.round(seconds/86400) + ' days';
  else if (seconds < 3.154e9) crackTime = Math.round(seconds/31536000) + ' yrs';
  else if (seconds < 3.154e12) crackTime = Math.round(seconds/3.154e9) + 'B yrs';
  else crackTime = '∞';
  document.getElementById('s-crack').textContent = crackTime;
}

function copyPw() {
  const pw = document.getElementById('pw-text').textContent;
  if (pw === 'Click Generate ↓') return;
  navigator.clipboard.writeText(pw);
  showToast('Password copied!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Generate on load
generate();
</script>
</body>
</html>
